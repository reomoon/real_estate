<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>바나의 아파트 실거래가</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="manifest" href="/static/manifest.json">
  <!-- document.write 가로채기:
       Naver SDK가 geocoder를 document.write로 주입하면 Chrome이 차단함.
       미리 가로채서 동적 <script> 삽입으로 교체. -->
  <script>
    (function() {
      var _dw = document.write.bind(document);
      document.write = function(markup) {
        var m = markup.match(/src=["']([^"']+)["']/);
        if (m && m[1].indexOf('maps-geocoder') !== -1) {
          var s = document.createElement('script');
          s.src = m[1];
          document.head.appendChild(s);
        } else {
          _dw(markup);
        }
      };
    })();
  </script>
  <!-- 네이버 지도 SDK: geocoder 서브모듈 포함 -->
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId={{ naver_maps_key }}&submodules=geocoder"></script>
  <!-- Chart.js: 실거래 가격 추이 차트 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --blue: #2563eb;
      --red: #ef4444;
      --dark: #111827;
      --gray: #6b7280;
      --border: #e5e7eb;
      --header-h: 52px;
      --filter-h: 36px;
      --tab-h: 0px;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; }
    body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #f9fafb; }

    /* ── 지도 컨테이너 ── */
    /* 네이버 SDK가 #map에 position:relative를 덮어쓰므로
       fixed 레이아웃은 wrapper가 담당하고, #map은 100% 채움 */
    #map-wrap {
      position: fixed;
      top: calc(var(--safe-top) + var(--header-h) + var(--filter-h));
      left: 0; right: 0;
      bottom: var(--tab-h);
    }
    #map {
      width: 100%;
      height: 100%;
    }

    /* ── 헤더 ── */
    #header {
      position: fixed;
      top: var(--safe-top);
      left: 0; right: 0;
      height: var(--header-h);
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      z-index: 500;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    #header-logo {
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
      white-space: nowrap;
      letter-spacing: -.3px;
    }
    #header-logo span { color: var(--blue); }

    /* ── 지역 탭 (서울/경기/인천) ── */
    #region-tabs { display: flex; gap: 3px; flex-shrink: 0; }
    .rtab {
      padding: 4px 9px;
      border-radius: 7px;
      border: none;
      background: #f3f4f6;
      font-size: 12px;
      font-weight: 700;
      color: var(--gray);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .1s, color .1s;
    }
    .rtab.active { background: var(--blue); color: #fff; }

    #district-scroll {
      flex: 1;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #district-scroll.hidden { display: none; }
    #district-scroll::-webkit-scrollbar { display: none; }
    .dist-chip {
      flex-shrink: 0;
      padding: 5px 11px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background .1s, border-color .1s, color .1s;
    }
    .dist-chip.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* ── 가격 마커 ── */
    .price-tag {
      background: var(--blue);
      color: #fff;
      font-size: 11.5px;
      font-weight: 700;
      padding: 4px 7px;
      border-radius: 6px;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(37,99,235,.35);
      position: relative;
      display: inline-block;
      line-height: 1.3;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .price-tag::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--blue);
      border-bottom: 0;
    }
    /* 대장 아파트 — 진한 보라색 */
    .price-tag.champion {
      background: #6d28d9;
      box-shadow: 0 2px 8px rgba(109,40,217,.45);
    }
    .price-tag.champion::after { border-top-color: #6d28d9; }
    .price-tag.active {
      background: var(--red);
      box-shadow: 0 3px 10px rgba(239,68,68,.4);
    }
    .price-tag.active::after { border-top-color: var(--red); }
    .price-tag .apt-name {
      font-size: 12px;
      font-weight: 500;
      opacity: .9;
      margin-bottom: 1px;
      white-space: nowrap;
    }
    .price-tag .crown { font-size: 11px; margin-right: 2px; }
    .price-tag .sub {
      font-size: 9px;
      font-weight: 400;
      opacity: .85;
      margin-left: 2px;
    }
    .price-tag .built {
      font-size: 9px;
      font-weight: 400;
      opacity: .75;
      display: block;
      margin-top: 1px;
    }

    /* ── 세대수 필터 칩 ── */
    #filter-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 6px 64px 6px 12px;
      border-bottom: 1px solid var(--border);
      background: #fff;
      position: fixed;
      top: calc(var(--safe-top) + var(--header-h));
      left: 0; right: 0;
      z-index: 490;
    }
    #filter-scroll::-webkit-scrollbar { display: none; }
    #apt-filter {
      position: relative;
      flex-shrink: 0;
    }
    #btn-household {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      cursor: pointer;
      white-space: nowrap;
    }
    #btn-household.active {
      background: #eff6ff;
      border-color: var(--blue);
      color: var(--blue);
    }
    #household-panel {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      min-width: 128px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(17,24,39,.12);
      z-index: 520;
    }
    #household-panel.open { display: block; }
    .household-option {
      width: 100%;
      padding: 8px 10px;
      border: none;
      border-radius: 10px;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      text-align: left;
      cursor: pointer;
    }
    .household-option:hover,
    .household-option.active {
      background: #eff6ff;
      color: var(--blue);
    }

    /* ── 로딩 오버레이 ── */
    #loading {
      position: fixed;
      top: calc(var(--safe-top) + var(--header-h) + var(--filter-h));
      left: 0; right: 0; bottom: var(--tab-h);
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(3px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 800;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text {
      margin-top: 12px;
      font-size: 13px;
      color: var(--gray);
    }
    #loading-progress {
      margin-top: 6px;
      font-size: 12px;
      color: #9ca3af;
    }

    /* ── 하단 바텀시트 (아파트 상세) ── */
    #sheet {
      position: fixed;
      left: 0; right: 0;
      bottom: var(--tab-h);
      background: #fff;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,.12);
      z-index: 700;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,1,.32,1);
      max-height: 88vh;
      display: flex;
      flex-direction: column;
    }
    #sheet.open { transform: translateY(0); }

    #sheet-handle {
      width: 36px; height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    #sheet-header {
      padding: 12px 18px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #sheet-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }
    #sheet-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #sheet-detail {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }
    .sheet-detail-addr {
      font-size: 11px;
      color: #94a3b8;
    }
    .sheet-detail-chip {
      font-size: 11px;
      background: #f1f5f9;
      border-radius: 4px;
      padding: 1px 5px;
      white-space: nowrap;
      color: #475569;
    }
    #sheet-meta {
      font-size: 12px;
      color: var(--gray);
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    #sheet-naver-link {
      flex-shrink: 0;
      font-size: 11px;
      color: #000;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
      background: #00de5a;
      border: 1px solid #00de5a;
      border-radius: 12px;
      padding: 5px 10px;
    }
    #sheet-naver-link:hover { background: #dcfce7; }
    /* 구 평균 비교 바 */
    #sheet-dong-compare {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
    }
    #sheet-dong-compare .avg-label { color: var(--gray); flex-shrink: 0; }
    #sheet-dong-compare .avg-price { color: var(--dark); font-weight: 600; }
    #sheet-dong-compare .diff-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
    }
    .diff-up   { background: #fef2f2; color: #dc2626; }
    .diff-down { background: #f0fdf4; color: #16a34a; }
    .diff-same { background: #f3f4f6; color: var(--gray); }
    /* ── 평형 선택 + 가격 행 ── */
    #sheet-price-row {
      padding: 10px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #sheet-area-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #sheet-area-list::-webkit-scrollbar { display: none; }
    .sheet-area-btn {
      flex-shrink: 0;
      min-width: 176px;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--dark);
      text-align: left;
      cursor: pointer;
    }
    .sheet-area-btn.active {
      border-color: var(--blue);
      background: #eff6ff;
      box-shadow: inset 0 0 0 1px rgba(37,99,235,.06);
    }
    .sheet-area-main {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
    }
    .sheet-area-sub {
      margin-top: 4px;
      font-size: 11px;
      color: var(--gray);
      line-height: 1.3;
    }
    .sheet-area-avg {
      margin-top: 3px;
      font-size: 11px;
      color: #6366f1;
      line-height: 1.3;
    }
    #sheet-price-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }
    #sheet-price-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }
    #sheet-price {
      font-size: 24px;
      font-weight: 800;
      color: var(--blue);
    }
    #sheet-price-date {
      font-size: 11px;
      color: var(--gray);
    }
    #sheet-price-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }
    #sheet-price-avg {
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      white-space: nowrap;
      text-align: right;
    }
    /* ── 고정 상단 / 스크롤 영역 ── */
    #sheet-fixed {
      flex-shrink: 0;
    }
    #sheet-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    /* ── 차트 영역 ── */
    #sheet-chart-wrap {
      padding: 8px 16px 6px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    #sheet-chart-wrap canvas { width: 100% !important; }
    #sheet-tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px 0;
      flex-shrink: 0;
    }
    .sheet-tab {
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--gray);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-tab.active {
      background: #eff6ff;
      border-color: var(--blue);
      color: var(--blue);
    }

    /* 기간 탭 */
    #chart-period-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .period-tab, .chart-tab {
      flex: 1;
      padding: 5px 0;
      border: none;
      background: none;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      -webkit-tap-highlight-color: transparent;
    }
    .period-tab.active, .chart-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    #chart-click-price {
      display: none;
      position: absolute;
      background: #1e293b;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 8px;
      pointer-events: none;
      transform: translate(-50%, -110%);
      white-space: nowrap;
      z-index: 10;
    }
    #chart-click-price::after {
      content: '';
      position: absolute;
      bottom: -5px; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-bottom: none;
      border-top-color: #1e293b;
    }

    /* 요약 배너 */
    #chart-summary,
    #volume-summary {
      background: #b8cafb;
      border-radius: 6px;
      padding: 5px 10px;
      margin-bottom: 6px;
      font-size: 11px;
      color: #9ca3af;
      display: none;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    #chart-summary.visible,
    #volume-summary.visible { display: flex; }
    #chart-summary .sum-range,
    #volume-summary .sum-range { color: #010814; font-size: 11px; }
    #chart-summary .sum-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 auto;
      font-size: 11px;
      font-weight: 700;
      color: #334155;
      white-space: nowrap;
    }
    #chart-summary .sum-meta .meta-item { white-space: nowrap; }
    #chart-summary .sum-change,
    #volume-summary .sum-change { margin-left: auto; font-weight: 700; font-size: 12px; }
    .sum-up   { color: #dc2626; }
    .sum-down { color: #0054f3; }
    .sum-flat { color: #9ca3af; }

    /* 차트 하단 통계 */
    #volume-stats {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: bold;
      color: #475569;
      background: ##d7e7f7;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    #volume-stats .stat-item { white-space: nowrap; }
    .volume-list {
      padding: 8px 16px 16px;
    }
    .volume-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 13px;
    }
    .volume-row:last-child { border-bottom: none; }
    .volume-month {
      color: var(--dark);
      font-weight: 600;
    }
    .volume-count {
      color: var(--blue);
      font-weight: 700;
    }
    .volume-compare {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
    }
    .volume-compare.up { color: #dc2626; }
    .volume-compare.down { color: #2563eb; }
    .volume-compare.flat { color: var(--gray); }
    #sheet-trades {
      padding-bottom: var(--safe-bottom);
    }

    /* ── 면적 타입 섹션 ── */
    .area-section { border-bottom: 8px solid #f3f4f6; }
    .area-section:last-child { border-bottom: none; }
    .area-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #f0f4ff;
      border-bottom: 1px solid #dbeafe;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .area-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--blue);
    }
    .area-latest-price {
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      flex: 1;
    }
    .area-latest-date {
      font-size: 11px;
      color: var(--gray);
    }

    /* ── 거래 테이블 ── */
    .trade-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .trade-table thead tr {
      background: #f9fafb;
      border-bottom: 1px solid var(--border);
    }
    .trade-table thead th {
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--gray);
      text-align: left;
    }
    .trade-table thead th:last-child { text-align: right; }
    .trade-table tbody tr {
      border-bottom: 1px solid #f3f4f6;
    }
    .trade-table tbody tr:last-child { border-bottom: none; }
    .trade-table tbody td {
      padding: 9px 8px;
      vertical-align: middle;
    }
    .col-ym    { color: var(--gray); white-space: nowrap; }
    .col-day   { color: #9ca3af; }
    .col-info  { color: #6b7280; font-size: 11px; white-space: nowrap; }
    .col-price { font-size: 13px; font-weight: 600; color: var(--dark); }
    .col-tt .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 5px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .badge-매매 { background: #eff6ff; color: var(--blue); }
    .badge-전세 { background: #f0fdf4; color: #16a34a; }
    .badge-월세 { background: #fff7ed; color: #ea580c; }
    .col-dong  { color: #9ca3af; font-size: 11px; white-space: nowrap; text-align: right; }
    #sheet-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 28px; height: 28px;
      background: #f3f4f6;
      border: none;
      border-radius: 50%;
      font-size: 15px;
      color: var(--gray);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 하단 탭 바 ── */
    #tabbar {
      position: fixed;
      left: 0; right: 0;
      bottom: 0;
      height: calc(var(--tab-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]));
}

function renderSchoolMarkerContent(school) {
  const meta = school.summary_text
    ? `<div class="school-meta">${escapeHtml(school.summary_text)}</div>`
    : '';
  return `<div class="school-name">${escapeHtml(school.name)}</div>${meta}`;
}

function renderSchoolPopup(school, detail, loading = false) {
  if (loading) {
    return `<div class="school-popup"><div class="ttl">${escapeHtml(school.name)}</div><div class="sub">${escapeHtml(school.type)}</div><div class="row">불러오는 중...</div></div>`;
  }
  if (!detail?.available) {
    return `<div class="school-popup"><div class="ttl">${escapeHtml(school.name)}</div><div class="sub">${escapeHtml(school.type)}</div></div>`;
  }

  const rows = [];
  if (detail.type === '중학교') {
    rows.push(`<div class="row">과학고: ${detail.science_high_count ?? 0}명</div>`);
    rows.push(`<div class="row">외고·국제고: ${detail.foreign_lang_high_count ?? 0}명</div>`);
    if (detail.special_purpose_rate != null) {
      rows.push(`<div class="row">과고+외고 비율: ${detail.special_purpose_rate}%</div>`);
    }
  } else {
    if (detail.seoul_national_count != null) {
      rows.push(`<div class="row">수시: ${detail.seoul_national_early_count ?? 0}명</div>`);
      rows.push(`<div class="row">정시: ${detail.seoul_national_regular_count ?? 0}명</div>`);
      rows.push(`<div class="row">합계: ${detail.seoul_national_count ?? 0}명</div>`);
    } else {
      rows.push(`<div class="row">대학: ${detail.university_count ?? 0}명</div>`);
      rows.push(`<div class="row">전문대학: ${detail.junior_college_count ?? 0}명</div>`);
      rows.push(`<div class="row">국외진학: ${detail.overseas_count ?? 0}명</div>`);
    }
  }
  if (detail.message) {
    rows.push(`<div class="note">${escapeHtml(detail.message)}</div>`);
  }

  return `<div class="school-popup"><div class="ttl">${escapeHtml(school.name)}</div><div class="sub">${escapeHtml(school.type)}</div>${rows.join('')}</div>`;
}

async function fetchSchoolDetail(school) {
  const key = `${school.type}|${school.name}|${school.address}|${currentDistrict}`;
  if (schoolDetailCache[key]) return schoolDetailCache[key];
  const params = new URLSearchParams({
    district: currentDistrict,
    name: school.name,
    school_type: school.type,
    address: school.address || '',
  });
  const detail = await fetch(`/api/school-detail?${params}`).then(r => r.json());
  schoolDetailCache[key] = detail;
  return detail;
}

async function hydrateSchoolMarker(school, el) {
  try {
    const detail = await fetchSchoolDetail(school);
    if (detail?.summary_text) {
      school.summary_text = detail.summary_text;
      el.innerHTML = renderSchoolMarkerContent(school);
    }
  } catch (err) {
    console.error('[school-detail] hydrate failed:', err);
  }
}

async function loadSchoolMarkers() {
  hideSchoolMarkers();
  schoolMarkers = [];
  if (!currentDistrict || !window.naver?.maps?.Service) return;
  if (map.getZoom() < ZOOM_CLUSTER) return;
  lastSchoolDistrict = currentDistrict;
  if (!schoolInfoWindow) {
    schoolInfoWindow = new naver.maps.InfoWindow({
      content: '',
      borderWidth: 0,
      backgroundColor: 'transparent',
      pixelOffset: new naver.maps.Point(0, -8),
      disableAnchor: false,
    });
  }

  const [midRes, highRes] = await Promise.all([
    fetch(`/api/schools?district=${encodeURIComponent(currentDistrict)}&school_type=${encodeURIComponent('중학교')}`).then(r => r.json()),
    fetch(`/api/schools?district=${encodeURIComponent(currentDistrict)}&school_type=${encodeURIComponent('고등학교')}`).then(r => r.json()),
  ]);
  const schools = [
    ...(midRes.schools || []),
    ...(highRes.schools || []),
  ];

  for (const school of schools) {
    const addr = school.address;
    if (!addr) continue;
    let pos = schoolGeocodeCache[addr];
    if (!pos) {
      pos = await new Promise(resolve => {
        naver.maps.Service.geocode({ query: addr }, (status, res) => {
          if (status !== naver.maps.Service.Status.OK) { resolve(null); return; }
          const item = res.v2?.addresses?.[0];
          if (!item) { resolve(null); return; }
          resolve({ lat: parseFloat(item.y), lng: parseFloat(item.x) });
        });
      });
      if (pos) schoolGeocodeCache[addr] = pos;
    }
    if (!schoolVisible) break;
    if (!pos) continue;

    const el = document.createElement('div');
    el.className = `school-marker${school.type === '고등학교' ? ' type-고' : ''}`;
    el.innerHTML = renderSchoolMarkerContent(school);

    const marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(pos.lat, pos.lng),
      map,
      icon: { content: el, anchor: new naver.maps.Point(0, 20) },
      zIndex: 200,
    });
    naver.maps.Event.addListener(marker, 'click', async () => {
      if (!schoolInfoWindow) return;
      schoolInfoWindow.setContent(renderSchoolPopup(school, null, true));
      schoolInfoWindow.open(map, marker);
      try {
        const detail = await fetchSchoolDetail(school);
        if (detail?.summary_text) {
          school.summary_text = detail.summary_text;
          el.innerHTML = renderSchoolMarkerContent(school);
        }
        schoolInfoWindow.setContent(renderSchoolPopup(school, detail));
      } catch (err) {
        console.error('[school-detail] click failed:', err);
        schoolInfoWindow.setContent(renderSchoolPopup(school, { available: false, message: '학교 정보를 불러오지 못했습니다.' }));
      }
    });
    schoolMarkers.push(marker);
    hydrateSchoolMarker(school, el);
  }
}

// ── 지도 idle 핸들러 (300ms 디바운스) ──────────────────────
function onMapIdle() {
  clearTimeout(_idleTimer);
  _idleTimer = setTimeout(() => {
    updateCurrentDistrict();
    updateHeaderLayout();
    updateVisibleMarkers();
    if (map.getZoom() < ZOOM_CLUSTER) {
      hideSchoolMarkers();
    } else if (schoolVisible && currentDistrict && currentDistrict !== lastSchoolDistrict) {
      loadSchoolMarkers();
    }
    // 줌인 상태(단지 마커 표시 레벨)일 때만 자동 로드
    // 줌아웃에서는 구 마커 클릭 시에만 로드 (불필요한 API 호출 방지)
    if (map.getZoom() >= ZOOM_DONG) loadVisibleDistricts();
  }, 300);
}

// ── 지도 중심 기준으로 currentDistrict/Region 자동 갱신 ──────
function updateCurrentDistrict() {
  // 사용자가 직접 구를 선택한 경우 → idle이 바꾸지 않음
  if (userSelectedDistrict) return;

  // GPS 역지오코딩으로 확정된 위치가 있으면 항상 그걸 우선 사용
  if (myLocationDistrict) {
    if (currentDistrict !== myLocationDistrict) {
      currentDistrict = myLocationDistrict;
      document.querySelectorAll('.dist-chip').forEach(b =>
        b.classList.toggle('active', b.textContent === currentDistrict));
    }
    return;
  }

  const c = map.getCenter();
  let minDist = Infinity, best = null, bestRegion = null;
  Object.entries(REGION_DATA).forEach(([region, data]) => {
    Object.entries(data.centers).forEach(([name, [lat, lng]]) => {
      const d = Math.hypot(lat - c.lat(), lng - c.lng());
      if (d < minDist) { minDist = d; best = name; bestRegion = region; }
    });
  });
  if (!best) return;

  // hysteresis: 현재 구까지의 거리보다 20% 이상 가까울 때만 전환
  const curCenter = DISTRICT_CENTERS[currentDistrict];
  if (curCenter) {
    const curDist = Math.hypot(curCenter[0] - c.lat(), curCenter[1] - c.lng());
    if (minDist > curDist * 0.8) return;
  }

  const regionChanged = bestRegion !== currentRegion;
  currentRegion = bestRegion;
  currentDistrict = best;
  if (regionChanged) {
    document.querySelectorAll('.rtab').forEach(b =>
      b.classList.toggle('active', b.dataset.region === currentRegion));
    buildDistrictBar();
  } else {
    document.querySelectorAll('.dist-chip').forEach(b =>
      b.classList.toggle('active', b.textContent === currentDistrict));
  }
}

// ── 화면에 보이는 구/시 로드 ───────────────────────────────
async function loadVisibleDistricts() {
  const z = map.getZoom();
  const toLoad = new Set();

  if (z >= ZOOM_DONG) {
    // 줌인 상태: currentDistrict만 로드 (불필요한 이웃 구 조회 방지)
    if (currentDistrict
        && !loadedDistricts.has(currentDistrict)
        && !loadingDistricts.has(currentDistrict)) {
      toLoad.add(currentDistrict);
    }
  } else {
    // 줌아웃 상태: 뷰포트에 보이는 구 로드
    const bounds = map.getBounds();
    Object.entries(DISTRICT_CENTERS).forEach(([name, [lat, lng]]) => {
      if (bounds.hasPoint(new naver.maps.LatLng(lat, lng))
          && !loadedDistricts.has(name)
          && !loadingDistricts.has(name)) {
        toLoad.add(name);
      }
    });
    // currentDistrict도 항상 포함
    if (currentDistrict
        && !loadedDistricts.has(currentDistrict)
        && !loadingDistricts.has(currentDistrict)) {
      toLoad.add(currentDistrict);
    }
  }

  if (toLoad.size) await Promise.all([...toLoad].map(d => loadDistrictData(d)));
}

// ── 구/시 단위 데이터 로드 (병렬 가능, 캐시 우선) ──────────────
async function loadDistrictData(district) {
  if (loadedDistricts.has(district) || loadingDistricts.has(district)) return;

  // 메모리 캐시 히트 → 즉시 반영
  if (districtMemCache[district]?.full) {
    loadedDistricts.add(district);
    if (districtMemCache[district].pending.length) geocodeBackground(district);
    return;
  }

  loadingDistricts.add(district);
  loadingCount++;
  setLoading(true, [...loadingDistricts].join(', ') + ' 조회 중...', '');

  try {
    // ── Quick Phase: 3개월 데이터 + 내 위치 동 필터로 빠르게 표시 ──
    const isMyDistrict = (district === currentDistrict) && myLocationDong;
    const quickParams  = new URLSearchParams({ district, quick: 'true' });
    if (isMyDistrict) quickParams.set('dong', myLocationDong);

    const quickRes  = await fetch(`/api/markers?${quickParams}`);
    const quickData = await quickRes.json();
    const quickApts = quickData.apartments || [];

    if (quickApts.length) {
      const withCoords    = quickApts.filter(a => a.lat && a.lng);
      const withoutCoords = quickApts.filter(a => !a.lat || !a.lng);
      const geocoded = withCoords.map(a => ({ apt: a, pos: new naver.maps.LatLng(a.lat, a.lng) }));
      districtMemCache[district] = { apts: quickApts, geocoded, pending: withoutCoords, full: false,
        monthly_trades: quickData.monthly_trades || {} };
      updateGlobalAptPool();
      updateVisibleMarkers();
      if (withoutCoords.length) geocodeBackground(district);
    }

    // ── Full Phase: 12개월 전체 데이터 백그라운드 로드 ──────────
    loadFullDistrict(district);

  } catch (e) {
    console.error(`[${district}] 로드 실패:`, e);
  } finally {
    loadingDistricts.delete(district);
    loadingCount--;
    if (loadingCount <= 0) setLoading(false);
    else setLoading(true, [...loadingDistricts].join(', ') + ' 조회 중...', '');
  }
}

// ── 12개월 전체 데이터 백그라운드 로드 ──────────────────────
async function loadFullDistrict(district) {
  try {
    const res  = await fetch(`/api/markers?district=${encodeURIComponent(district)}`);
    const data = await res.json();
    const apts = data.apartments || [];
    if (!apts.length) return;

    const withCoords    = apts.filter(a => a.lat && a.lng);
    const withoutCoords = apts.filter(a => !a.lat || !a.lng);
    const geocoded = withCoords.map(a => ({ apt: a, pos: new naver.maps.LatLng(a.lat, a.lng) }));

    // 기존 quick 캐시의 geocoded는 이미 있을 수 있으므로 병합
    const prev = districtMemCache[district];
    const mergedGeocoded = prev ? [...prev.geocoded] : [];
    const existingKeys = new Set(mergedGeocoded.map(e => e.apt.key));
    geocoded.forEach(e => { if (!existingKeys.has(e.apt.key)) mergedGeocoded.push(e); });

    districtMemCache[district] = { apts, geocoded: mergedGeocoded, pending: withoutCoords, full: true,
      monthly_trades: data.monthly_trades || districtMemCache[district]?.monthly_trades || {} };
    loadedDistricts.add(district);

    updateGlobalAptPool();
    updateVisibleMarkers();
    if (withoutCoords.length) geocodeBackground(district);
  } catch (e) {
    console.error(`[${district}] full 로드 실패:`, e);
  }
}

// ── geocoder 준비 대기 (document.write 비동기 로드 대응) ──
function waitForGeocoder(timeout = 10000) {
  return new Promise((resolve, reject) => {
    if (window.naver?.maps?.Service?.geocode) { resolve(); return; }
    const start = Date.now();
    const timer = setInterval(() => {
      if (window.naver?.maps?.Service?.geocode) { clearInterval(timer); resolve(); }
      else if (Date.now() - start > timeout) { clearInterval(timer); reject(new Error('geocoder timeout')); }
    }, 100);
  });
}

// ── 지오코딩 localStorage 캐시 ────────────────────────────
const GEO_CACHE_KEY = 'apt_geo_v1';
let _geoCache = null;
function getGeoCache() {
  if (!_geoCache) {
    try { _geoCache = JSON.parse(localStorage.getItem(GEO_CACHE_KEY) || '{}'); }
    catch { _geoCache = {}; }
  }
  return _geoCache;
}
function saveGeoCache(query, lat, lng) {
  const c = getGeoCache();
  c[query] = { lat, lng };
  try { localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(c)); } catch {}
}

// ── 네이버 geocoder로 주소 → 좌표 변환 (캐시 우선) ────────
function geocodeAddress(query) {
  const cached = getGeoCache()[query];
  if (cached) return Promise.resolve(new naver.maps.LatLng(cached.lat, cached.lng));

  return new Promise(resolve => {
    if (!window.naver?.maps?.Service?.geocode) { resolve(null); return; }
    const timer = setTimeout(() => resolve(null), 8000);
    naver.maps.Service.geocode({ query }, (status, res) => {
      clearTimeout(timer);
      if (status !== naver.maps.Service.Status.OK || !res.v2?.addresses?.length) {
        resolve(null);
        return;
      }
      const { x, y } = res.v2.addresses[0];
      saveGeoCache(query, parseFloat(y), parseFloat(x));
      resolve(new naver.maps.LatLng(parseFloat(y), parseFloat(x)));
    });
  });
}

// 지역별 행정 prefix & 인천 표시명 → 실제 주소명 매핑
const REGION_PREFIX = { '서울': '서울특별시', '경기': '경기도', '인천': '인천광역시' };
const DISTRICT_GEO_NAME = { '인천중구': '중구', '인천동구': '동구', '인천서구': '서구' };

// ── 단지 지오코딩 (서버 캐시 우선 → Naver geocoder fallback) ─
async function geocodeApt(apt) {
  // 서버 캐시에 좌표 있으면 즉시 반환 (지오코딩 생략)
  if (apt.lat && apt.lng) return new naver.maps.LatLng(apt.lat, apt.lng);

  const pref = REGION_PREFIX[apt.region || currentRegion] || '서울특별시';
  const dist = DISTRICT_GEO_NAME[apt.district] || apt.district;

  let pos = await geocodeAddress(`${pref} ${dist} ${apt.dong} ${apt.jibun}`);
  if (!pos) pos = await geocodeAddress(`${pref} ${dist} ${apt.dong} ${apt.name}`);
  if (!pos) pos = await geocodeAddress(`${pref} ${dist} ${apt.name}`);

  // 성공 시 서버에 저장 (fire-and-forget)
  if (pos) {
    fetch('/api/geocache', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: apt.key, lat: pos.lat(), lng: pos.lng() })
    }).catch(() => {});
  }

  return pos;
}

// ── 백그라운드 지오코딩 (viewport 중심에 가까운 것 우선) ──────
async function geocodeBackground(district) {
  const cache = districtMemCache[district];
  if (!cache || !cache.pending.length) return;

  // 현재 지도 중심 기준으로 정렬 (가까운 동 우선)
  const center = map.getCenter();
  const districtCenter = DISTRICT_CENTERS[district];
  const refLat = center ? center.lat() : (districtCenter?.[0] ?? 37.5665);
  const refLng = center ? center.lng() : (districtCenter?.[1] ?? 126.9780);

  const dongOrder = {};
  cache.pending.forEach(a => {
    if (!dongOrder[a.dong]) {
      const dc = DISTRICT_CENTERS[a.dong];
      const lat = dc?.[0] ?? refLat;
      const lng = dc?.[1] ?? refLng;
      dongOrder[a.dong] = Math.hypot(lat - refLat, lng - refLng);
    }
  });
  cache.pending.sort((a, b) => (dongOrder[a.dong] ?? 9) - (dongOrder[b.dong] ?? 9));

  while (cache.pending.length > 0) {
    const batch = cache.pending.splice(0, 4);
    const results = await Promise.all(batch.map(apt => geocodeApt(apt)));
    results.forEach((pos, i) => {
      if (!pos) return;
      cache.geocoded.push({ apt: batch[i], pos });
    });
    if (map.getZoom() >= ZOOM_DONG) {
      updateGlobalAptPool();
      updateVisibleMarkers();
    }
  }
  // 완료 후 뷰 갱신
  {
    updateGlobalAptPool();
    updateVisibleMarkers();
  }
}

// ── 줌 레벨에 따라 광역/구 클러스터 또는 단지 마커 표시 ─────
function updateVisibleMarkers() {
  const z = map.getZoom();
  if (z < ZOOM_REGION) {
    showRegionMarkers();
  } else if (z < ZOOM_DONG) {
    showDistrictMarkers();
  } else if (schoolVisible) {
    clearMarkers();
    hideAptMarkers();
    closeSheet();
  } else if (allGeocodedApts.length) {
    showAptMarkers();
  }
}

function showRegionMarkers() {
  clearMarkers();
  closeSheet();
  closeVolumeSheet();
  const bounds = map.getBounds();

  Object.entries(REGION_DATA).forEach(([region, data]) => {
    const center = REGION_CENTERS[region];
    if (!center) return;
    const pos = new naver.maps.LatLng(center[0], center[1]);
    if (!bounds.hasPoint(pos)) return;

    const el = document.createElement('div');
    el.className = 'region-tag';
    el.innerHTML = `${region}<span class="dt-count">${data.districts.length}개 구/시</span>`;

    const marker = new naver.maps.Marker({
      position: pos,
      map,
      icon: { content: el, anchor: new naver.maps.Point(el.offsetWidth / 2 || 52, el.offsetHeight / 2 || 28) },
      zIndex: 90,
    });

    naver.maps.Event.addListener(marker, 'click', () => {
      currentRegion = region;
      currentDistrict = data.districts[0];
      userSelectedDistrict = false;
      document.querySelectorAll('.rtab').forEach(b =>
        b.classList.toggle('active', b.dataset.region === currentRegion));
      buildDistrictBar();
      map.setCenter(pos);
      map.setZoom(Math.max(data.clusterZoom + 1, ZOOM_REGION));
    });

    markers.push(marker);
  });

  showBadge(`서울 · 경기 · 인천 중 지역을 선택하세요`);
}

function showDongMarkers() {
  clearMarkers();
  closeSheet();
  closeVolumeSheet();
  if (!allGeocodedApts.length) return;

  // 동별 위치 집계
  const dongMap = {};
  allGeocodedApts.forEach(({ apt, pos }) => {
    const dong = apt.dong;
    if (!dong) return;
    if (!dongMap[dong]) dongMap[dong] = { lats: [], lngs: [], count: 0 };
    dongMap[dong].lats.push(pos.lat());
    dongMap[dong].lngs.push(pos.lng());
    dongMap[dong].count++;
  });

  const bounds = map.getBounds();
  Object.entries(dongMap).forEach(([dong, { lats, lngs, count }]) => {
    const lat = lats.reduce((a, b) => a + b) / lats.length;
    const lng = lngs.reduce((a, b) => a + b) / lngs.length;
    const pos = new naver.maps.LatLng(lat, lng);
    if (!bounds.hasPoint(pos)) return;

    const el = document.createElement('div');
    el.className = 'dong-tag';
    el.innerHTML = `${dong}<span class="dt-count">${count}개 단지</span>`;

    const marker = new naver.maps.Marker({
      position: pos,
      map,
      icon: { content: el, anchor: new naver.maps.Point(el.offsetWidth / 2 || 45, el.offsetHeight / 2 || 26) },
      zIndex: 100,
    });

    naver.maps.Event.addListener(marker, 'click', () => {
      map.setCenter(pos);
      map.setZoom(ZOOM_DONG);
    });

    markers.push(marker);
  });
  showBadge(`${currentDistrict} · 동을 선택하세요`);
}

function showAptMarkers() {
  closeVolumeSheet();
  // 구/동 클러스터 마커만 제거 (apt 마커는 풀에서 재사용)
  markers.forEach(m => m.setMap(null));
  markers = [];

  const bounds = map.getBounds();
  const activeKeys = new Set(allGeocodedApts.map(({ apt }) => apt.key));
  let count = 0;

  allGeocodedApts.forEach(({ apt, pos }) => {
    const inBounds = bounds.hasPoint(pos);
    let entry = _aptPool.get(apt.key);

    if (!entry) {
      // 풀에 없으면 새로 생성
      entry = createAptMarker(apt, pos);
      entry.apt = apt;
      _aptPool.set(apt.key, entry);
    }
    entry.marker.setMap(inBounds ? map : null);
    if (inBounds) count++;

    // 활성 마커 스타일 복원
    if (apt.key === activeAptKey) {
      entry.el.classList.add('active');
      activeMarkerEl = entry.el;
    }
  });

  // 풀에서 더 이상 필요 없는 마커 제거 (필터 변경 등)
  _aptPool.forEach((entry, key) => {
    if (!activeKeys.has(key)) {
      entry.marker.setMap(null);
      _aptPool.delete(key);
    }
  });

  showBadge(`${currentDistrict} · ${count}개 단지`);
}

function showDistrictMarkers() {
  clearMarkers();
  closeSheet();
  const bounds = map.getBounds();
  Object.entries(REGION_DATA).forEach(([region, data]) => {
    data.districts.forEach(name => {
      const center = DISTRICT_CENTERS[name];
      if (!center) return;
      const pos = new naver.maps.LatLng(center[0], center[1]);
      if (!bounds.hasPoint(pos)) return;

      const el = document.createElement('div');
      el.className = `district-tag${volumeVisible ? ' volume-mode' : ''}`;
      el.innerHTML = volumeVisible
        ? `${name}${tradeVolumeHtml(name)}`
        : `${name}${kbIndexHtml(name)}`;

      const marker = new naver.maps.Marker({
        position: pos,
        map,
        icon: { content: el, anchor: new naver.maps.Point(el.offsetWidth / 2 || 45, el.offsetHeight / 2 || 26) },
        zIndex: 100,
      });

      naver.maps.Event.addListener(marker, 'click', () => {
        if (volumeVisible) {
          openDistrictVolumeSheet(name);
          return;
        }
        const [lat, lng] = DISTRICT_CENTERS[name];
        currentRegion = region;
        currentDistrict = name;
        userSelectedDistrict = true;
        document.querySelectorAll('.rtab').forEach(b =>
          b.classList.toggle('active', b.dataset.region === currentRegion));
        buildDistrictBar();
        map.setCenter(new naver.maps.LatLng(lat, lng));
        map.setZoom(ZOOM_DONG);
        loadDistrictData(name);
      });

      markers.push(marker);
    });
  });
  showBadge(`서울 · 경기 · 인천 · 구/시를 선택하세요`);
}

// ── 마커 생성 (풀용) ──────────────────────────────────────
function aptMarkerHTML(apt) {
  const crown = apt.is_champion ? '<span class="crown">👑</span>' : '';
  const area = apt.main_area_label ? `<span class="px-area">${apt.main_area_label}</span>` : '';
  const sil = `<div class="px-row"><span class="px-lbl">실</span>${apt.price_display}${area}</div>`;
  return `<div class="apt-name">${crown}${apt.name}</div>${sil}`;
}

function kbAptHtml(district) {
  if (!district) return '';
  const info = kbIndexData[district];
  if (!info || !info.index) return '';
  const sign = info.change > 0 ? '▲' : info.change < 0 ? '▼' : '';
  const cls  = info.change > 0 ? 'kb-up' : info.change < 0 ? 'kb-down' : '';
  const abs  = Math.abs(info.change).toFixed(2);
  const chg  = sign ? `<span class="${cls}">${sign}${abs}%</span>` : `${abs}%`;
  return `<span class="kb-apt">KB ${info.index.toFixed(2)} ${chg}</span>`;
}

function createAptMarker(apt, pos) {
  const el = document.createElement('div');
  el.className = 'price-tag' + (apt.is_champion ? ' champion' : '');
  el.innerHTML = aptMarkerHTML(apt);

  const marker = new naver.maps.Marker({
    position: pos,
    map: null, // 처음엔 숨김 — showAptMarkers에서 표시 결정
    icon: {
      content: el,
      anchor: new naver.maps.Point(el.offsetWidth / 2 || 38, 26),
    },
  });

  naver.maps.Event.addListener(marker, 'click', () => {
    if (activeMarkerEl) activeMarkerEl.classList.remove('active');
    el.classList.add('active');
    activeMarkerEl = el;
    activeAptKey = apt.key;
    openSheet(apt);
  });

  return { marker, el, apt };
}

function clearMarkers() {
  // 구/동 클러스터 마커 제거
  markers.forEach(m => m.setMap(null));
  markers = [];
  // apt 마커 풀도 전부 숨김 (줌아웃 시)
  _aptPool.forEach(({ marker }) => marker.setMap(null));
  activeMarkerEl = null;
}

let sheetChart = null;

let volumeVisible = false;

async function openSheet(apt) {
  currentApt = apt;
  document.getElementById('sheet-name').textContent = apt.name;
  const addr = apt.jibun ? `${apt.dong} ${apt.jibun}` : apt.dong;

  document.getElementById('sheet-meta-addr').textContent = addr;

  // 상세정보 로딩
  const detailEl = document.getElementById('sheet-detail');
  detailEl.innerHTML = '';
  fetch(`/api/apt-detail?key=${encodeURIComponent(apt.key)}&district=${encodeURIComponent(apt.district)}`)
    .then(r => r.json())
    .then(d => {

function renderSheetDetails(apt) {
  document.getElementById('sheet-chart-wrap').style.visibility = '';

  // 평형 드롭다운 구성 — 34평(84㎡) 우선 선택
  const list = document.getElementById('sheet-area-list');
  list.innerHTML = '';
  const preferredSizes = [84, 59];
  const types = apt.area_types || [];
  let defaultIdx = 0;
  let bestDist = Infinity;
  types.forEach((t, i) => {
    for (const pref of preferredSizes) {
      const dist = Math.abs(t.area_key - pref);
      if (dist < bestDist) { bestDist = dist; defaultIdx = i; }
    }
  });
  types.forEach((at, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'sheet-area-btn';
    btn.dataset.idx = i;
    btn.innerHTML = `
      <div class="sheet-area-main">${at.label} · 최근 ${at.latest_price_display}</div>
      <div class="sheet-area-sub">${at.latest_date}</div>
      ${at.district_avg_display ? `<div class="sheet-area-avg">${apt.district} 평균 ${at.district_avg_display}</div>` : ''}
    `;
    btn.addEventListener('click', () => renderSheetArea(apt, i));

}

function tradeRows(trades) {

    return `<tr>

      <td class="col-day">${t.day}</td>
      <td class="col-info">${t.info || '-'}</td>
      <td class="col-price">${t.price_display}</td>

      <td class="col-dong">${dongFloor || '-'}</td>

  }).join('');
}

function getRecent12Months() {
  const out = [];
  const now = new Date();
  now.setDate(1);
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    out.push(`${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}`);
  }
  return out;
}

function normalizeMonthlyTrades(monthlyTrades) {
  const months = getRecent12Months();
  return months.map(ym => ({ ym, count: monthlyTrades?.[ym] || 0 }));
}

function yearAgoYm(ym) {
  return `${parseInt(ym.slice(0, 4), 10) - 1}${ym.slice(4)}`;
}

function formatYearCompare(item, monthlyTrades) {
  const prevYm = yearAgoYm(item.ym);
  const prevCount = monthlyTrades?.[prevYm];
  if (prevCount == null) return '<span class="volume-compare flat">작년 데이터 없음</span>';
  const diff = item.count - prevCount;
  const prevLabel = `${parseInt(prevYm.slice(0, 4), 10)}.${prevYm.slice(4)}`;
  if (diff === 0) {
    return `<span class="volume-compare flat">${prevLabel} 대비 동일</span>`;
  }
  const cls = diff > 0 ? 'up' : 'down';
  const sign = diff > 0 ? '+' : '-';
  const label = diff > 0 ? '높음' : '낮음';
  return `<span class="volume-compare ${cls}">${prevLabel} 대비 ${sign}${Math.abs(diff).toLocaleString()}건 ${label}</span>`;
}

      const data = await res.json();
      monthlyTrades = data.monthly_trades || {};
      districtMemCache[districtName] = {
        ...(districtMemCache[districtName] || {}),

      };
    }

    const now = new Date();
    const curYear = now.getFullYear();
    const curMonth = now.getMonth() + 1;

    const listEl = document.getElementById('volume-list');

async function loadMoreTrades() {

  tradesState.loading = true;

  const loadMoreEl = document.getElementById('trades-load-more');
  if (loadMoreEl) loadMoreEl.textContent = '불러오는 중...';

  const { apt, areaIdx, nextOffset } = tradesState;

    const params = new URLSearchParams({
      district: apt.district,

      offset: nextOffset,
      count: 6,
    });
    const res  = await fetch(`/api/more-trades?${params}`);

    const tbody = document.getElementById('trades-tbody');
    if (tbody && data.trades?.length) {

    if (loadMoreEl) loadMoreEl.textContent = '불러오기 실패';

}

// ── 차트 상태 ──────────────────────────────────────────────
let currentChartTrades = [];

function tradeFullYear(ym) {
  const yr2 = parseInt((ym || '').split('.')[0]);
  return yr2 <= 30 ? 2000 + yr2 : 1900 + yr2;
}

function fmtPrice(v) {
  if (!v) return '-';
  if (v < 10000) return `${v.toLocaleString()}만`;
  const eok = Math.round(v / 10000 * 100) / 100; // 소수점 둘째 자리
  if (eok === Math.floor(eok)) return `${Math.floor(eok)}억`;
  return `${eok.toFixed(2).replace(/\.?0+$/, '')}억`;
}

function parseTradeDate(t) {
  const yr  = tradeFullYear(t.year_month);
  const mo  = parseInt((t.year_month || '').split('.')[1] || '1') - 1;
  const day = parseInt(t.day) || 1;
  return new Date(yr, mo, day);
}

// 180일 이동평균 계산
function calc180DayMA(trades) {
  const MS_180 = 180 * 24 * 60 * 60 * 1000;
  return trades.map((t, i) => {
    const d = parseTradeDate(t);
    const cutoff = d.getTime() - MS_180;
    const window = trades.filter((tr, j) => {
      if (j > i) return false;
      return parseTradeDate(tr).getTime() >= cutoff;
    });
    if (!window.length) return null;
    const avg = window.reduce((s, tr) => s + (tr.price || 0), 0) / window.length;
    return Math.round(avg);
  });
}

let _chartMonths = 12;

function renderChart(allTrades, months) {
  if (months !== undefined) _chartMonths = months;
  const canvas = document.getElementById('sheet-chart');
  const wrap   = document.getElementById('sheet-chart-wrap');
  if (sheetChart) { sheetChart.destroy(); sheetChart = null; }

  // 탭 활성화
  document.querySelectorAll('.chart-tab').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.months) === _chartMonths);
  });

  // 매매만, 날짜 오름차순, 기간 필터
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - _chartMonths);
  let trades = allTrades
    .filter(t => t.trade_type === '매매' && parseTradeDate(t) >= cutoff)
    .reverse();

  const summaryEl = document.getElementById('chart-summary');

  if (!trades.length) {
    wrap.style.display = 'none';
    summaryEl.classList.remove('visible');
    return;
  }
  wrap.style.display = 'block';

  const prices = trades.map(t => t.price || 0);

  // 요약 배너
  const first = trades[0], last = trades[trades.length - 1];
  const firstY  = tradeFullYear(first.year_month), lastY = tradeFullYear(last.year_month);
  const firstMo = (first.year_month || '').split('.')[1] || '?';
  const lastMo  = (last.year_month  || '').split('.')[1] || '?';
  const totalMonths = (lastY - firstY) * 12 + (parseInt(lastMo) - parseInt(firstMo));
  const durTxt = totalMonths >= 12
    ? `${Math.floor(totalMonths/12)}년 ${totalMonths%12 ? totalMonths%12+'개월' : ''}`
    : `${Math.max(totalMonths, 1)}개월`;
  const priceDiff = last.price - first.price;
  const pct  = first.price ? ((priceDiff / first.price) * 100).toFixed(1) : 0;
  const cls  = priceDiff > 0 ? 'sum-up' : priceDiff < 0 ? 'sum-down' : 'sum-flat';
  const sign = priceDiff > 0 ? '+' : '';
  const maxVal = Math.max(...prices), minVal = Math.min(...prices);
  const maxIdx = prices.indexOf(maxVal), minIdx = prices.indexOf(minVal);
  summaryEl.innerHTML = `
    <span class="sum-range">${firstY}.${firstMo} ~ ${lastY}.${lastMo} (${durTxt.trim()})</span>
    <span class="sum-meta">
<span class="meta-item">최고 ${fmtPrice(maxVal)}</span>
      <span class="meta-item">최저 ${fmtPrice(minVal)}</span>
    </span>
    <span class="sum-change ${cls}">${sign}${fmtPrice(Math.abs(priceDiff))} (${sign}${pct}%)</span>
  `;
  summaryEl.classList.add('visible');

  const pointColors = prices.map((_, i) =>
    i === maxIdx ? '#ef4444' : i === minIdx ? '#3b82f6' : '#6366f1');
  const pointRadii = prices.map((_, i) =>
    i === maxIdx || i === minIdx ? 5 : 2.5);

  // 180일선
  const maData = calc180DayMA(trades);

  // 최고/최저 라벨 플러그인
  const minMaxPlugin = {
    id: 'minmaxlabel',
    afterDatasetDraw(chart, args) {
      if (args.index !== 0) return;
      const ds  = chart.getDatasetMeta(0);
      const ctx = chart.ctx;
      ctx.save();
      [{ idx: maxIdx, label: '최고', color: '#ef4444', above: true },
       { idx: minIdx, label: '최저', color: '#3b82f6', above: false }].forEach(({ idx, label, color, above }) => {
        const pt = ds.data[idx];
        if (!pt) return;
        ctx.font = 'bold 10px -apple-system,sans-serif';
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.fillText(label, pt.x, above ? pt.y - 8 : pt.y + 16);
      });
      ctx.restore();
    }
  };

  sheetChart = new Chart(canvas, {
    type: 'line',
    plugins: [minMaxPlugin],
    data: {
      labels: trades.map(t => `${t.year_month}.${t.day}`),
      datasets: [
        {
          label: '매매가',
          data: prices,
          borderColor: '#6366f1',
          backgroundColor: 'rgba(239,68,68,0.08)',
          borderWidth: 2,
          pointRadius: pointRadii,
          pointBackgroundColor: pointColors,
          tension: 0.3,
          fill: true,
          order: 2,
        },
        {
          label: '180일선',
          data: maData,
          borderColor: '#f59e0b',
          borderWidth: 1.5,
          borderDash: [5, 3],
          pointRadius: 0,
          tension: 0.4,
          fill: false,
          order: 1,
        }
      ]
    },
    options: {
      responsive: true,
      layout: { padding: { top: 14 } },
      onClick(event, elements) {
        const clickPriceEl = document.getElementById('chart-click-price');
        if (!elements.length) { clickPriceEl.style.display = 'none'; return; }
        const el = elements[0];
        if (el.datasetIndex !== 0) return;
        const trade = trades[el.index];
        const pt = sheetChart.getDatasetMeta(0).data[el.index];
        const wrap = document.getElementById('sheet-chart-wrap');
        const wrapRect = wrap.getBoundingClientRect();
        const canvasRect = canvas.getBoundingClientRect();
        const x = canvasRect.left - wrapRect.left + pt.x;
        const y = canvasRect.top  - wrapRect.top  + pt.y;
        clickPriceEl.textContent = `${trade.year_month}.${trade.day}  ${fmtPrice(trade.price)}`;
        clickPriceEl.style.display = 'block';
        clickPriceEl.style.left = `${x}px`;
        clickPriceEl.style.top  = `${y}px`;
      },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      },
      scales: {
        x: { ticks: { font: { size: 10 }, maxTicksLimit: 6 }, grid: { display: false } },
        y: {
          min: Math.max(0, minVal - Math.round((maxVal - minVal) * 0.2 + 3000)),
          ticks: { font: { size: 10 }, callback: v => {
            const e = Math.floor(v / 10000); return e ? `${e}억` : `${v/1000}천`;
          }},
          grid: { color: '#f3f4f6' }
        }
      }
    }
  });

}

// ── 바텀시트 스와이프 닫기 ──────────────────────────────────
// 고정 상단(평형·가격 영역)에서 아래로 드래그할 때만 닫힘
// 그래프·거래내역 영역은 스와이프로 닫히지 않음
(function initSwipe() {
  const sheet   = document.getElementById('sheet');
  const fixedEl = document.getElementById('sheet-fixed');
  let startY = 0, startedOnFixed = false;
  let dragging = false;

  sheet.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startedOnFixed = fixedEl.contains(e.target);
    dragging = true;
  }, { passive: true });

  sheet.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 50 && startedOnFixed) closeSheet();
  }, { passive: true });
})();

// ── 역지오코딩으로 구/시 + 동 판별 ────────────────────────
// Naver reverseGeocode 응답: res.v2.results[0].region.area2.name = "용인시 수지구"
//                                                       area3.name = "신봉동"
function detectLocationByReverseGeocode(latlng) {
  return new Promise(resolve => {
    if (!window.naver?.maps?.Service?.reverseGeocode) { resolve(null); return; }
    naver.maps.Service.reverseGeocode(
      { coords: latlng, orders: [naver.maps.Service.OrderType.ADDR] },
      (status, res) => {
        if (status !== naver.maps.Service.Status.OK) { resolve(null); return; }
        // results 배열에서 area2(시군구), area3(동) 추출
        const result = res.v2?.results?.[0];
        const area2  = result?.region?.area2?.name || ''; // e.g. "용인시 수지구"
        const area3  = result?.region?.area3?.name || ''; // e.g. "신봉동"

        const GEO_NAME_MAP = { '인천중구': '중구', '인천동구': '동구', '인천서구': '서구' };
        for (const [region, data] of Object.entries(REGION_DATA)) {
          for (const district of data.districts) {
            const search = GEO_NAME_MAP[district] || district;
            if (area2.includes(search)) {
              resolve({ region, district, dong: area3 });
              return;
            }
          }
        }
        resolve(null);
      }
    );
  });
}

let myLocationDong = '';        // 시작 시 역지오코딩으로 감지한 내 위치 동
let myLocationDistrict = '';    // 역지오코딩으로 확정된 구/시
let myLocationLatLng = null;    // GPS 좌표
let userSelectedDistrict = false; // 사용자가 직접 구 선택했으면 true → idle이 바꾸지 않음

// ── 시작 ───────────────────────────────────────────────────
document.getElementById('sheet-close').addEventListener('click', closeSheet);
document.getElementById('volume-sheet-close').addEventListener('click', closeVolumeSheet);

// 차트 기간 탭
document.getElementById('chart-period-tabs')?.addEventListener('click', async e => {
  const btn = e.target.closest('.chart-tab');
  if (!btn) return;
  const months = parseInt(btn.dataset.months);
  document.getElementById('chart-click-price').style.display = 'none';

  // 24개월 탭: 캐시 없으면 서버에서 추가 데이터 요청
  if (months === 24 && currentApt) {
    const areaIdx = tradesState?.areaIdx ?? 0;
    const at24 = currentApt._area_types_24?.[areaIdx];
    if (at24) {
      renderChart(at24.trades, 24);
    } else {
      btn.textContent = '로딩...';
      btn.disabled = true;
      try {
        const params = new URLSearchParams({ key: currentApt.key, district: currentApt.district, months: 24 });
        const res  = await fetch(`/api/apt-trades?${params}`);
        const data = await res.json();
        currentApt._area_types_24 = data.area_types || [];
        const at = currentApt._area_types_24[areaIdx];
        if (at) renderChart(at.trades, 24);
      } finally {
        btn.textContent = '24개월';
        btn.disabled = false;
      }
    }
  } else {
    renderChart(currentChartTrades, months);
  }
});

// 거래 리스트 스크롤 감지 → 무한 로드
document.getElementById('sheet-scroll').addEventListener('scroll', () => {
  const el = document.getElementById('sheet-scroll');
  if (el.scrollHeight - el.scrollTop - el.clientHeight < 80) {
    loadMoreTrades();
  }
}, { passive: true });

// ── KB 주간 아파트 가격 지수 로드 ────────────────────────────
async function loadKbIndex() {
  try {
    const res = await fetch('/api/kb-index');
    const data = await res.json();
    kbIndexData = data.districts || {};
    if (map && map.getZoom() < ZOOM_CLUSTER) updateVisibleMarkers();
  } catch (e) {
    // KB 데이터 없어도 앱은 정상 동작
  }
}

function kbIndexHtml(districtName) {
  const info = kbIndexData[districtName];
  if (!info || !info.index) return '';
  const sign = info.change > 0 ? '▲' : info.change < 0 ? '▼' : '';
  const cls  = info.change > 0 ? 'kb-up' : info.change < 0 ? 'kb-down' : '';
  const abs  = Math.abs(info.change).toFixed(2);
  const chg  = sign ? `<span class="${cls}">${sign}${abs}%</span>` : `${abs}%`;
  return `<span class="kb-idx">KB지수 ${info.index.toFixed(2)} ${chg}</span>`;
}

function tradeVolumeHtml(districtName) {
  const mt = districtMemCache[districtName]?.monthly_trades;
  if (!mt || !Object.keys(mt).length) return '';
  const entries = Object.entries(mt).sort((a, b) => b[0].localeCompare(a[0]));
  const target = entries[1] || entries[0];
  if (!target) return '';
  const [ym, cnt] = target;
  return `<span class="kb-idx" style="opacity:.8">${parseInt(ym.slice(4), 10)}월 ${cnt.toLocaleString()}건</span>`;
}

async function startApp() {
  initMap();
  buildRegionTabs();
  buildDistrictBar();
  buildFilterBar();
  loadKbIndex(); // 백그라운드로 KB 지수 로드 (비차단)

  // GPS + geocoder 준비를 병렬로 처리
  const [gpsResult] = await Promise.all([
    // GPS: 내 위치 이동 (geocoder 없이도 지도 이동은 가능)
    new Promise(resolve => {
      if (!navigator.geolocation) { resolve(null); return; }
      navigator.geolocation.getCurrentPosition(pos => {
        map.setCenter(new naver.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
        map.setZoom(12); // 구/시 클러스터가 보이는 줌으로 시작
        resolve(pos);
      }, () => resolve(null), { timeout: 5000 });
    }),
    // geocoder 준비
    waitForGeocoder(10000).catch(() => {}),
  ]);

  // geocoder 준비됐으면 역지오코딩으로 정확한 구/동 판별
  if (gpsResult && window.naver?.maps?.Service?.reverseGeocode) {
    const latlng = new naver.maps.LatLng(gpsResult.coords.latitude, gpsResult.coords.longitude);
    const found  = await detectLocationByReverseGeocode(latlng);
    if (found) {
      currentRegion      = found.region;
      currentDistrict    = found.district;
      myLocationDong     = found.dong;
      myLocationDistrict = found.district;
      myLocationLatLng   = latlng;
      document.querySelectorAll('.rtab').forEach(b =>
        b.classList.toggle('active', b.dataset.region === currentRegion));
      buildDistrictBar();
    }
  }

  // 구 마커만 표시 — 실제 데이터는 구 마커 클릭 시 로드 (지연 로딩)
  updateVisibleMarkers();
}

startApp();
</script>
