<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>아파트 실거래가</title>
  <!-- 네이버 지도 SDK: 서버에서 .env의 NAVER_MAPS_KEY를 주입 -->
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId={{ naver_maps_key }}"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --blue: #2563eb;
      --red: #ef4444;
      --dark: #111827;
      --gray: #6b7280;
      --border: #e5e7eb;
      --header-h: 52px;
      --tab-h: 48px;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #f9fafb; }

    /* ── 지도 컨테이너 ── */
    /* 네이버 SDK가 #map에 position:relative를 덮어쓰므로
       fixed 레이아웃은 wrapper가 담당하고, #map은 100% 채움 */
    #map-wrap {
      position: fixed;
      top: calc(var(--safe-top) + var(--header-h));
      left: 0; right: 0;
      bottom: var(--tab-h);
    }
    #map {
      width: 100%;
      height: 100%;
    }

    /* ── 헤더 ── */
    #header {
      position: fixed;
      top: var(--safe-top);
      left: 0; right: 0;
      height: var(--header-h);
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      z-index: 500;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    #header-logo {
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
      white-space: nowrap;
      letter-spacing: -.3px;
    }
    #header-logo span { color: var(--blue); }
    #district-scroll {
      flex: 1;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #district-scroll::-webkit-scrollbar { display: none; }
    .dist-chip {
      flex-shrink: 0;
      padding: 5px 11px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background .1s, border-color .1s, color .1s;
    }
    .dist-chip.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* ── 가격 마커 ── */
    .price-tag {
      background: var(--blue);
      color: #fff;
      font-size: 11.5px;
      font-weight: 700;
      padding: 4px 7px;
      border-radius: 6px;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(37,99,235,.35);
      position: relative;
      display: inline-block;
      line-height: 1.3;
      -webkit-tap-highlight-color: transparent;
    }
    .price-tag::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--blue);
      border-bottom: 0;
    }
    .price-tag.active {
      background: var(--red);
      box-shadow: 0 3px 10px rgba(239,68,68,.4);
    }
    .price-tag.active::after { border-top-color: var(--red); }
    .price-tag .apt-name {
      font-size: 10px;
      font-weight: 500;
      opacity: .9;
      margin-bottom: 2px;
      white-space: nowrap;
    }
    .price-tag .sub {
      font-size: 9px;
      font-weight: 400;
      opacity: .85;
      margin-left: 2px;
    }

    /* ── 로딩 오버레이 ── */
    #loading {
      position: fixed;
      top: calc(var(--safe-top) + var(--header-h));
      left: 0; right: 0; bottom: var(--tab-h);
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(3px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 800;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text {
      margin-top: 12px;
      font-size: 13px;
      color: var(--gray);
    }
    #loading-progress {
      margin-top: 6px;
      font-size: 12px;
      color: #9ca3af;
    }

    /* ── 하단 바텀시트 (아파트 상세) ── */
    #sheet {
      position: fixed;
      left: 0; right: 0;
      bottom: var(--tab-h);
      background: #fff;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,.12);
      z-index: 700;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,1,.32,1);
      max-height: 70vh;
      display: flex;
      flex-direction: column;
    }
    #sheet.open { transform: translateY(0); }

    #sheet-handle {
      width: 36px; height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    #sheet-header {
      padding: 12px 18px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #sheet-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 3px;
    }
    #sheet-meta {
      font-size: 12px;
      color: var(--gray);
    }
    #sheet-price-row {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #sheet-price {
      font-size: 26px;
      font-weight: 800;
      color: var(--blue);
    }
    #sheet-price-date {
      font-size: 11px;
      color: var(--gray);
      margin-top: 2px;
    }
    #sheet-trades {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      padding-bottom: var(--safe-bottom);
    }
    .trade-item {
      display: flex;
      align-items: center;
      padding: 11px 18px;
      border-bottom: 1px solid #f3f4f6;
    }
    .trade-item:last-child { border-bottom: none; }
    .trade-date {
      font-size: 12px;
      color: var(--gray);
      width: 80px;
      flex-shrink: 0;
    }
    .trade-price {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
      flex: 1;
    }
    .trade-floor {
      font-size: 12px;
      color: #9ca3af;
    }
    #sheet-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 28px; height: 28px;
      background: #f3f4f6;
      border: none;
      border-radius: 50%;
      font-size: 15px;
      color: var(--gray);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 하단 탭 바 ── */
    #tabbar {
      position: fixed;
      left: 0; right: 0;
      bottom: 0;
      height: calc(var(--tab-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 600;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: var(--tab-h);
      border: none;
      background: none;
      color: var(--gray);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active { color: var(--blue); }
    .tab-icon { font-size: 20px; line-height: 1; }

    /* ── 단지 수 뱃지 ── */
    #count-badge {
      position: fixed;
      top: calc(var(--safe-top) + var(--header-h) + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(17,24,39,.78);
      backdrop-filter: blur(4px);
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 20px;
      z-index: 490;
      white-space: nowrap;
      display: none;
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div id="header">
  <div id="header-logo">아파트 <span>실거래</span></div>
  <div id="district-scroll"></div>
</div>

<!-- 지도 -->
<div id="map-wrap">
  <div id="map"></div>
</div>

<!-- 로딩 -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">데이터 불러오는 중...</div>
  <div id="loading-progress"></div>
</div>

<!-- 단지 수 뱃지 -->
<div id="count-badge"></div>

<!-- 하단 시트 (상세) -->
<div id="sheet">
  <div id="sheet-handle"></div>
  <button id="sheet-close">✕</button>
  <div id="sheet-header">
    <div id="sheet-name"></div>
    <div id="sheet-meta"></div>
  </div>
  <div id="sheet-price-row">
    <div id="sheet-price"></div>
    <div id="sheet-price-date"></div>
  </div>
  <div id="sheet-trades"></div>
</div>

<!-- 하단 탭 -->
<div id="tabbar">
  <button class="tab-btn active" id="tab-map">
    <span class="tab-icon">🗺️</span>지도
  </button>
  <button class="tab-btn" id="tab-refresh" onclick="refreshData()">
    <span class="tab-icon">🔄</span>새로고침
  </button>
</div>

<script>
// 네이버 지도 키 (.env → 서버 → 템플릿 변수로 주입됨)
const NAVER_CLIENT_ID = '{{ naver_maps_key }}';
const DISTRICTS = [
  '강남구','서초구','송파구','강동구','마포구','용산구','성동구','광진구',
  '노원구','도봉구','강북구','은평구','서대문구','종로구','중구',
  '동대문구','중랑구','성북구','강서구','양천구','구로구','영등포구',
  '동작구','관악구','금천구'
];

let map = null;
let markers = [];
let activeMarkerEl = null;
let currentDistrict = '강남구';
let isBusy = false;

// ── 지도 초기화 ────────────────────────────────────────────
function initMap() {
  map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(37.5665, 126.9780),
    zoom: 13,
    zoomControl: false,
    scaleControl: false,
    logoControl: false,
    mapDataControl: false,
  });
  naver.maps.Event.addListener(map, 'click', closeSheet);
}

// ── 구 선택 탭 ─────────────────────────────────────────────
function buildDistrictBar() {
  const bar = document.getElementById('district-scroll');
  DISTRICTS.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'dist-chip' + (name === currentDistrict ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => selectDistrict(name);
    bar.appendChild(btn);
  });
}

function selectDistrict(name) {
  if (isBusy || name === currentDistrict) return;
  currentDistrict = name;
  document.querySelectorAll('.dist-chip').forEach(b => {
    b.classList.toggle('active', b.textContent === name);
  });
  closeSheet();
  loadApartments(name);
}

// ── 데이터 로드 ────────────────────────────────────────────
async function loadApartments(district) {
  isBusy = true;
  setLoading(true, `${district} 실거래 조회 중...`, '');
  clearMarkers();

  try {
    const res = await fetch(`/api/apartments?district=${encodeURIComponent(district)}`);
    const data = await res.json();
    const apts = data.apartments || [];

    if (!apts.length) {
      setLoading(false);
      showBadge(`${district} · 해당 조건 아파트 없음`);
      isBusy = false;
      return;
    }

    renderMarkers(apts, district);
  } catch (e) {
    console.error(e);
    setLoading(false);
    alert('데이터 로드 실패: ' + e.message);
  } finally {
    isBusy = false;
  }
}

// ── 마커 렌더 (서버에서 받은 좌표 사용) ──────────────────────
function renderMarkers(apts, district) {
  if (!map) { console.error('지도 미초기화'); return; }

  const withCoords = apts.filter(a => a.lat && a.lng);
  if (!withCoords.length) {
    showBadge(`${district} · 위치 데이터 없음`);
    setLoading(false);
    return;
  }

  const bounds = new naver.maps.LatLngBounds();
  withCoords.forEach(apt => {
    const pos = new naver.maps.LatLng(apt.lat, apt.lng);
    bounds.extend(pos);
    placeMarker(apt, pos);
  });

  map.fitBounds(bounds, { top: 70, right: 20, bottom: 80, left: 20 });
  showBadge(`${district} · ${withCoords.length}개 단지`);
  setLoading(false);
}

// ── 마커 배치 ──────────────────────────────────────────────
function placeMarker(apt, pos) {
  const el = document.createElement('div');
  el.className = 'price-tag';
  el.innerHTML = `<div class="apt-name">${apt.name}</div>${apt.price_display}<span class="sub">${apt.pyeong_type}</span>`;

  const marker = new naver.maps.Marker({
    position: pos,
    map,
    icon: {
      content: el,
      anchor: new naver.maps.Point(el.offsetWidth / 2 || 38, 26),
    },
  });

  naver.maps.Event.addListener(marker, 'click', () => {
    if (activeMarkerEl) activeMarkerEl.classList.remove('active');
    el.classList.add('active');
    activeMarkerEl = el;
    openSheet(apt);
  });

  markers.push(marker);
}

function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  activeMarkerEl = null;
}

// ── 하단 시트 ──────────────────────────────────────────────
function openSheet(apt) {
  document.getElementById('sheet-name').textContent = apt.name;
  const area = apt.area ? apt.area.toFixed(2) + '㎡' : '';
  const built = apt.built_year ? ` · ${apt.built_year}년` : '';
  document.getElementById('sheet-meta').textContent =
    `${apt.dong} · ${apt.pyeong_type}(${area})${built}`;

  document.getElementById('sheet-price').textContent = apt.price_display;
  document.getElementById('sheet-price-date').textContent =
    `최근 거래일 ${apt.latest_date}`;

  const tradesEl = document.getElementById('sheet-trades');
  if (!apt.trades || !apt.trades.length) {
    tradesEl.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:13px">거래 내역 없음</div>';
  } else {
    tradesEl.innerHTML = apt.trades.map(t => `
      <div class="trade-item">
        <span class="trade-date">${t.date}</span>
        <span class="trade-price">${t.price_display}</span>
        <span class="trade-floor">${t.floor ? t.floor + '층' : ''}</span>
      </div>
    `).join('');
  }

  document.getElementById('sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  if (activeMarkerEl) {
    activeMarkerEl.classList.remove('active');
    activeMarkerEl = null;
  }
}

// ── 유틸 ───────────────────────────────────────────────────
function setLoading(show, text, progress) {
  document.getElementById('loading').classList.toggle('hidden', !show);
  if (text) document.getElementById('loading-text').textContent = text;
  if (progress !== undefined) document.getElementById('loading-progress').textContent = progress;
}

function showBadge(text) {
  const b = document.getElementById('count-badge');
  b.textContent = text;
  b.style.display = 'block';
}

function refreshData() {
  if (isBusy) return;
  // 캐시 삭제 후 재로드
  fetch('/api/cache', { method: 'DELETE' })
    .then(() => loadApartments(currentDistrict));
}

// ── 바텀시트 스와이프 닫기 ─────────────────────────────────
(function initSwipe() {
  const sheet = document.getElementById('sheet');
  let startY = 0;
  sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 60) closeSheet();
  }, { passive: true });
})();

// ── 시작 ───────────────────────────────────────────────────
document.getElementById('sheet-close').addEventListener('click', closeSheet);

function startApp() {
  initMap();
  buildDistrictBar();
  loadApartments(currentDistrict);
}

// SDK가 <head>에서 동기 로드되므로 여기서 바로 실행 가능
startApp();
</script>
</body>
</html>
